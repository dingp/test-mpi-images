name: Build Ubuntu 24.04 CUDA 12.8.1 image

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths:
      - "container/ubuntu-24.04-cuda-12.8.1.Dockerfile"
      - ".github/workflows/build-ubuntu-24.04-cuda-12.8.1.yaml"
  workflow_dispatch:

jobs:
  build_and_push_image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dingp/test-mpi-images
          tags: |
            type=raw,value=ubuntu-24.04-cuda-12.8.1

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./container/ubuntu-24.04-cuda-12.8.1.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
